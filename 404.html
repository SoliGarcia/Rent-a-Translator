<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 - Page Not Found | Rent a Translator</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="styles.css">
  <style>
    /* Loading */
    #loading-screen {
      position: fixed;
      inset: 0;
      background-color: #36454F;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-screen.fade-out {
      opacity: 0;
      pointer-events: none;
    }
    .loader-logo {
      font-size: 2rem;
      color: goldenrod;
      font-family: 'Times New Roman', serif;
      font-weight: bold;
      margin-bottom: 1.5rem;
      letter-spacing: 1px;
    }
    .spinner-ring {
      width: 56px;
      height: 56px;
      border: 5px solid rgba(218, 165, 32, 0.25);
      border-top-color: goldenrod;
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* error card */
    .error-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12);
      padding: 3rem 2.5rem;
      max-width: 560px;
      width: 100%;
      text-align: center;
      animation: slideUp 0.6s ease both;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }
    .error-code {
      font-size: 7rem;
      font-weight: 800;
      color: #36454F;
      line-height: 1;
      letter-spacing: -4px;
    }
    .error-code span {
      color: goldenrod;
    }
    .error-icon {
      font-size: 3.5rem;
      margin: 0.5rem 0 1rem;
    }
    .error-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #36454F;
      margin-bottom: 0.75rem;
    }
    .error-desc {
      color: #6c757d;
      font-size: 1rem;
      margin-bottom: 2rem;
      line-height: 1.6;
    }
    .btn-home {
      background-color: #36454F;
      color: goldenrod;
      border: 2px solid goldenrod;
      border-radius: 8px;
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 600;
      text-decoration: none;
      transition: background-color 0.25s, color 0.25s;
      display: inline-block;
    }
    .btn-home:hover {
      background-color: goldenrod;
      color: #36454F;
    }
    .quick-links {
      margin-top: 1.75rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 0.5rem;
    }
    .quick-links a {
      font-size: 0.875rem;
      color: royalblue;
      text-decoration: none;
      padding: 0.3rem 0.75rem;
      border: 1px solid #dee2e6;
      border-radius: 20px;
      transition: border-color 0.2s, background 0.2s;
    }
    .quick-links a:hover {
      border-color: royalblue;
      background: #f0f4ff;
    }
    .error-page-wrapper {
      min-height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
  </style>
</head>

<body>
  <div id="loading-screen">
    <div class="loader-logo">Rent a Translator</div>
    <div class="spinner-ring"></div>
  </div>

  <div id="app">
    <header>
      <h1>Rent a Translator</h1>
      <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="ServicePage.html">Services</a> |
        <a href="ConnectPage.html">Contact</a>
      </nav>
    </header>

    <div class="error-page-wrapper">
      <div class="error-card">
        <div class="error-code">4<span>0</span>4</div>
        <div class="error-icon">&#128269;</div>
        <div class="error-title">{{ title }}</div>
        <p class="error-desc">{{ description }}</p>
        <a href="index.html" class="btn-home">Take Me Home</a>
        <div class="quick-links">
          <a href="about.html">About</a>
          <a href="ServicePage.html">Our Translators</a>
          <a href="ConnectPage.html">Contact Us</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vue@3.4.21/dist/vue.global.prod.js"></script>
  <script>
    // Remove loading
    window.addEventListener("load", function () {
      const loader = document.getElementById("loading-screen");
      setTimeout(function () {
        loader.classList.add("fade-out");
        setTimeout(function () { loader.remove(); }, 500);
      }, 800);
    });

    const { createApp } = Vue;
    createApp({
      data() {
        return {
          title: "Page Not Found",
          description: "The page you're looking for doesn't exist or may have been moved. Check the address and try again, or use one of the links below."
        };
      }
    }).mount("#app");
  </script>
</body>

</html>
